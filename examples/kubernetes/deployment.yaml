apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-actuator-lite-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-actuator-lite-example
  template:
    metadata:
      labels:
        app: node-actuator-lite-example
    spec:
      containers:
        - name: app
          image: ghcr.io/example/node-actuator-lite-example:latest
          ports:
            - name: http
              containerPort: 3000
            - name: actuator
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: actuator
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: actuator
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
